<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Electrical | Cost Tracker</title>
    
    <!-- Lightbulb Favicon (Brand Yellow) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23facc15' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5'/%3E%3Cpath d='M9 18h6'/%3E%3Cpath d='M10 22h4'/%3E%3C/svg%3E">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React JSX Runtime -->
    <script type="importmap">
    {
        "imports": {
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
        }
    }
    </script>
    
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        /* Customise date picker icon for dark mode */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Home, Briefcase, Users, PieChart, Plus, Clock, Wrench, 
            ChevronRight, ArrowLeft, Save, Activity, Cloud, RefreshCw, 
            UserPlus, FileText, Download, Calendar, X, FileSpreadsheet, Settings, Link, Edit, Trash2, BarChart3, TrendingUp
        } from 'https://esm.sh/lucide-react@0.294.0';

        // Custom Hook for Local Storage (used for the Script URL)
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });
            useEffect(() => {
                try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch (error) {}
            }, [key, storedValue]);
            return [storedValue, setStoredValue];
        }

        function App() {
            // --- Core App Navigation State ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeProject, setActiveProject] = useState(null);
            const [view, setView] = useState('main'); 

            // --- Database Settings ---
            const [scriptUrl, setScriptUrl] = useLocalStorage('ee_script_url', '');

            // --- Cloud Sync State ---
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [projects, setProjects] = useState([]);
            const [people, setPeople] = useState([]);
            const [timeLogs, setTimeLogs] = useState([]);
            const [materialLogs, setMaterialLogs] = useState([]);
            
            // Ref to track saving status inside intervals
            const isSavingRef = useRef(false);
            useEffect(() => { isSavingRef.current = saving; }, [saving]);

            // --- Function to fetch latest data silently ---
            const fetchLatestData = async (showLoadingScreen = false) => {
                if (!scriptUrl) return;
                if (showLoadingScreen) setLoading(true);
                
                try {
                    const res = await fetch(scriptUrl);
                    const data = await res.json();
                    
                    // Only update if we aren't currently trying to save something
                    if (!isSavingRef.current) {
                        setProjects(data.projects || []);
                        setPeople(data.people || []);
                        setTimeLogs(data.timeLogs || []);
                        setMaterialLogs(data.materialLogs || []);
                    }
                    if (showLoadingScreen) setLoading(false);
                } catch (err) {
                    console.error("Failed to fetch data:", err);
                    if (showLoadingScreen) setLoading(false);
                }
            };

            // Fetch Data on Load & Start Auto-Sync Polling
            useEffect(() => {
                if (scriptUrl) {
                    fetchLatestData(true); // Initial load with loading screen
                    
                    // Auto-sync every 10 seconds in the background
                    const intervalId = setInterval(() => {
                        fetchLatestData(false);
                    }, 10000); 
                    
                    return () => clearInterval(intervalId); // Cleanup
                } else {
                    // Start completely empty if no URL is set
                    setProjects([]);
                    setPeople([]);
                    setTimeLogs([]);
                    setMaterialLogs([]);
                    setLoading(false);
                }
            }, [scriptUrl]);

            // Pull the latest data the moment an add/edit screen opens, so you are
            // always working from current figures (e.g. the newest rates and team
            // members) before logging or editing anything. Runs silently.
            useEffect(() => {
                const refreshOnOpen = [
                    'add-project', 'edit-project', 'add-person', 'edit-person',
                    'add-time', 'edit-time', 'add-material', 'edit-material'
                ];
                if (scriptUrl && refreshOnOpen.includes(view)) {
                    fetchLatestData(false);
                }
            }, [view]);

            // Save a SINGLE record change to Google Apps Script.
            // We never push the whole database, so two people editing different
            // records at the same time can never overwrite each other. The server
            // applies this one change under a lock and we then pull the merged truth.
            const pushOp = async (action, type, record) => {
                if (!scriptUrl || !record) return;
                setSaving(true);
                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, type, record })
                    });
                } catch (err) {
                    console.error("Failed to save:", err);
                    alert("Could not reach the cloud. Tap Refresh to check whether your change saved.");
                } finally {
                    setSaving(false);
                    // Reconcile with the server so we also pick up the other person's changes.
                    fetchLatestData(false);
                }
            };

            // Wrapped Setters: update local state optimistically, then push the one
            // record that changed. action is 'upsert' (add/edit) or 'delete'.
            const handleSetProjects = (newProjects, action, record) => { setProjects(newProjects); pushOp(action, 'projects', record); };
            const handleSetPeople = (newPeople, action, record) => { setPeople(newPeople); pushOp(action, 'people', record); };
            const handleSetTimeLogs = (newLogs, action, record) => { setTimeLogs(newLogs); pushOp(action, 'timeLogs', record); };
            const handleSetMaterialLogs = (newLogs, action, record) => { setMaterialLogs(newLogs); pushOp(action, 'materialLogs', record); };

            // --- Form States ---
            const [projectFilter, setProjectFilter] = useState('All');
            const [analyticsFilter, setAnalyticsFilter] = useState('All');
            const [analyticsSite, setAnalyticsSite] = useState('All');
            const [newProjName, setNewProjName] = useState('');
            const [newProjClient, setNewProjClient] = useState('');
            const [newProjQuote, setNewProjQuote] = useState('');
            const [newProjStatus, setNewProjStatus] = useState('Quotes Submitted');
            
            // --- Edit Project Form States ---
            const [editProjName, setEditProjName] = useState('');
            const [editProjClient, setEditProjClient] = useState('');
            const [editProjQuote, setEditProjQuote] = useState('');
            
            // --- Log & Edit Time States ---
            const [timeDate, setTimeDate] = useState(new Date().toISOString().split('T')[0]); // Default today
            const [timePersonId, setTimePersonId] = useState('');
            const [timeHours, setTimeHours] = useState('');
            const [timeNotes, setTimeNotes] = useState('');
            const [editingTimeLog, setEditingTimeLog] = useState(null);
            const [editTimeDate, setEditTimeDate] = useState('');
            const [editTimePersonId, setEditTimePersonId] = useState('');
            const [editTimeHours, setEditTimeHours] = useState('');
            const [editTimeNotes, setEditTimeNotes] = useState('');
            
            // --- Log Material States ---
            const [matDate, setMatDate] = useState(new Date().toISOString().split('T')[0]); // Default today
            const [matItem, setMatItem] = useState('');
            const [matCost, setMatCost] = useState('');

            // --- Edit Material States ---
            const [editingMaterialLog, setEditingMaterialLog] = useState(null);
            const [editMatDate, setEditMatDate] = useState('');
            const [editMatItem, setEditMatItem] = useState('');
            const [editMatCost, setEditMatCost] = useState('');
            
            // --- Team Member States ---
            const [newPersonName, setNewPersonName] = useState('');
            const [newPersonRole, setNewPersonRole] = useState('Electrician');
            const [newPersonRate, setNewPersonRate] = useState('');

            // --- Edit Team Member States ---
            const [editingPerson, setEditingPerson] = useState(null);
            const [editPersonName, setEditPersonName] = useState('');
            const [editPersonRole, setEditPersonRole] = useState('');
            const [editPersonRate, setEditPersonRate] = useState('');

            // Export States & Settings
            const [showAccountantExport, setShowAccountantExport] = useState(false);
            const [exportStartDate, setExportStartDate] = useState('');
            const [exportEndDate, setExportEndDate] = useState('');
            const [localUrlInput, setLocalUrlInput] = useState(scriptUrl || '');

            // Helper: Format Euros (Ireland locale defaults)
            const formatCurrency = (amount) => new Intl.NumberFormat('en-IE', { style: 'currency', currency: 'EUR' }).format(amount);

            // Calculate Financials
            const getProjectFinancials = (projectId, startDate = null, endDate = null) => {
                const project = projects.find(p => p.id === projectId);
                if (!project) return null;

                let projectTime = timeLogs.filter(t => t.projectId === projectId);
                let projectMaterials = materialLogs.filter(m => m.projectId === projectId);

                if (startDate) {
                    projectTime = projectTime.filter(t => t.date.split('T')[0] >= startDate);
                    projectMaterials = projectMaterials.filter(m => m.date.split('T')[0] >= startDate);
                }
                if (endDate) {
                    projectTime = projectTime.filter(t => t.date.split('T')[0] <= endDate);
                    projectMaterials = projectMaterials.filter(m => m.date.split('T')[0] <= endDate);
                }

                const labourCost = projectTime.reduce((total, log) => {
                    const person = people.find(p => p.id === log.personId);
                    return total + (log.hours * (person?.rate || 0));
                }, 0);

                const materialCost = projectMaterials.reduce((total, log) => total + Number(log.cost), 0);
                const totalCost = labourCost + materialCost;
                
                const currentProfit = project.quote - totalCost;
                const profitMargin = project.quote > 0 ? (currentProfit / project.quote) * 100 : 0;
                const spendPercentage = project.quote > 0 ? (totalCost / project.quote) * 100 : 0;

                return { labourCost, materialCost, totalCost, currentProfit, profitMargin, spendPercentage, quote: project.quote };
            };

            // Cloud Status Indicator (Now Clickable)
            const CloudIndicator = () => {
                if (!scriptUrl) return <div className="absolute top-5 right-5 flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider text-red-500"><Cloud size={12}/> Offline</div>;
                return (
                    <button 
                        onClick={() => fetchLatestData(true)}
                        className="absolute top-5 right-5 flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider text-gray-400 hover:text-white transition-colors bg-gray-800 px-2 py-1 rounded-lg border border-gray-700 shadow-md"
                    >
                        {saving ? <><RefreshCw size={12} className="animate-spin text-yellow-400"/> Saving...</> : <><RefreshCw size={12} className="text-blue-400"/> Refresh</>}
                    </button>
                );
            };

            // --- CSV EXPORT FUNCTIONS ---
            const exportAccountantCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += `Accountant Report (${exportStartDate || 'All Time'} to ${exportEndDate || 'All Time'})\n\n`;
                csvContent += "Project Name,Client,Status,Quoted (EUR),Labour Cost (EUR),Material Cost (EUR),Total Cost (EUR),Current Profit (EUR)\n";

                projects.forEach(p => {
                    const fin = getProjectFinancials(p.id, exportStartDate, exportEndDate);
                    if (fin) {
                        csvContent += `"${p.name}","${p.client}","${p.status}",${fin.quote},${fin.labourCost},${fin.materialCost},${fin.totalCost},${fin.currentProfit}\n`;
                    }
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Accountant_Report_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setShowAccountantExport(false);
            };

            const exportProjectCSV = () => {
                if (!activeProject) return;
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += `Project:,${activeProject.name}\n`;
                csvContent += `Client:,${activeProject.client}\n`;
                csvContent += `Status:,${activeProject.status}\n`;
                csvContent += `Quote:,€${activeProject.quote}\n\n`;

                csvContent += `--- TIME LOGS ---\n`;
                csvContent += `Date,Person,Hours,Cost (EUR),Notes\n`;
                
                const pTime = timeLogs.filter(t => t.projectId === activeProject.id).sort((a,b) => new Date(b.date) - new Date(a.date));
                pTime.forEach(t => {
                    const person = people.find(p => p.id === t.personId);
                    const cost = t.hours * (person?.rate || 0);
                    const dateObj = new Date(t.date);
                    const formattedDate = `${dateObj.getDate().toString().padStart(2, '0')}/${(dateObj.getMonth()+1).toString().padStart(2, '0')}/${dateObj.getFullYear()}`;
                    csvContent += `${formattedDate},"${person?.name || 'Unknown'}",${t.hours},${cost},"${t.notes || ''}"\n`;
                });

                csvContent += `\n--- MATERIAL LOGS ---\n`;
                csvContent += `Date,Item Description,Cost (EUR)\n`;
                
                const pMat = materialLogs.filter(m => m.projectId === activeProject.id).sort((a,b) => new Date(b.date) - new Date(a.date));
                pMat.forEach(m => {
                    const dateObj = new Date(m.date);
                    const formattedDate = `${dateObj.getDate().toString().padStart(2, '0')}/${(dateObj.getMonth()+1).toString().padStart(2, '0')}/${dateObj.getFullYear()}`;
                    csvContent += `${formattedDate},"${m.item}",${m.cost}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Project_Report_${activeProject.name.replace(/\s+/g, '_')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // --- VIEW: HOME / DASHBOARD ---
            const renderDashboard = () => {
                const ongoingProjects = projects.filter(p => p.status === 'Ongoing');
                const totalPipeline = projects.filter(p => p.status === 'Quotes Submitted' || p.status === 'Upcoming').reduce((sum, p) => sum + Number(p.quote), 0);
                
                return (
                    <div className="p-5 space-y-6 pb-24 relative">
                        <CloudIndicator />
                        <header className="mb-4 pr-12">
                            <h1 className="text-[16px] min-[375px]:text-[18px] sm:text-[22px] font-black text-white leading-tight whitespace-nowrap tracking-tighter">
                                <span className="text-yellow-400">T</span>imes <span className="text-yellow-400">I</span>nventory <span className="text-yellow-400">T</span>racking <span className="text-yellow-400">S</span>ystem
                            </h1>
                            <p className="text-gray-400 text-[13px] mt-1 italic font-medium">
                                <span className="text-yellow-400 font-bold tracking-widest">[+][+]</span> "Because Bigger Jobs Need Better Control."
                            </p>
                        </header>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-inner">
                                <h3 className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Active Jobs</h3>
                                <p className="text-3xl font-bold text-white">{ongoingProjects.length}</p>
                            </div>
                            <div className="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-inner">
                                <h3 className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Pipeline (Quotes)</h3>
                                <p className="text-xl font-bold text-blue-400">{formatCurrency(totalPipeline)}</p>
                            </div>
                        </div>

                        {/* Accountant Export Button */}
                        <button onClick={() => setShowAccountantExport(true)} className="w-full bg-gray-800 border border-gray-700 hover:border-yellow-400 text-gray-300 py-3 rounded-xl flex items-center justify-center gap-2 transition-colors text-sm font-bold shadow-sm">
                            <FileSpreadsheet className="text-yellow-400" size={18} />
                            Accountant Excel Export
                        </button>

                        <div>
                            <h2 className="text-lg font-bold text-white mb-3 flex items-center gap-2"><Activity size={18} className="text-yellow-400"/> Health Check (Ongoing)</h2>
                            <div className="space-y-4">
                                {ongoingProjects.length === 0 && <p className="text-gray-500 text-sm p-4 bg-gray-800/50 rounded-xl border border-gray-800 text-center">No ongoing jobs. Update a status in the Jobs tab.</p>}
                                
                                {ongoingProjects.map(project => {
                                    const fin = getProjectFinancials(project.id);
                                    let statusColor = 'bg-green-500';
                                    let statusText = 'Healthy';
                                    if (fin.spendPercentage > 85 && fin.spendPercentage <= 100) { statusColor = 'bg-orange-500'; statusText = 'Overspend Risk'; }
                                    if (fin.spendPercentage > 100) { statusColor = 'bg-red-500'; statusText = 'Loss Making'; }

                                    return (
                                        <div key={project.id} onClick={() => { setActiveProject(project); setView('project-detail'); }} className="bg-gray-800 p-4 rounded-xl border border-gray-700 active:bg-gray-700 transition-colors cursor-pointer shadow-md">
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="font-bold text-white">{project.name}</h3>
                                                <span className={`text-[10px] font-bold px-2 py-1 rounded-full text-white ${statusColor}`}>{statusText}</span>
                                            </div>
                                            <div className="flex justify-between text-sm mb-2">
                                                <span className="text-gray-400">Margin: <span className={fin.profitMargin > 20 ? 'text-green-400' : fin.profitMargin > 0 ? 'text-orange-400' : 'text-red-400'}>{fin.profitMargin.toFixed(1)}%</span></span>
                                                <span className="text-white font-bold">{formatCurrency(fin.currentProfit)}</span>
                                            </div>
                                            <div className="w-full bg-gray-700 rounded-full h-2">
                                                <div className={`${statusColor} h-2 rounded-full`} style={{ width: `${Math.min(fin.spendPercentage, 100)}%` }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Accountant Export Modal */}
                        {showAccountantExport && (
                            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                                <div className="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-sm p-6 shadow-2xl relative">
                                    <button onClick={() => setShowAccountantExport(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white">
                                        <X size={20} />
                                    </button>
                                    <h3 className="text-xl font-bold text-white mb-2 flex items-center gap-2">
                                        <FileSpreadsheet className="text-yellow-400" size={24} /> Export Report
                                    </h3>
                                    <p className="text-sm text-gray-400 mb-6">Select a date range to generate an Excel-compatible report of all projects and costs.</p>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Start Date (Optional)</label>
                                            <input type="date" value={exportStartDate} onChange={e => setExportStartDate(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-400 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">End Date (Optional)</label>
                                            <input type="date" value={exportEndDate} onChange={e => setExportEndDate(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-400 outline-none" />
                                        </div>
                                        
                                        <button onClick={exportAccountantCSV} className="w-full bg-yellow-400 text-gray-900 hover:bg-yellow-300 font-bold py-3 rounded-xl mt-4 flex justify-center items-center gap-2">
                                            <Download size={18} /> Download CSV
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- VIEW: PROJECTS LIST ---
            const renderProjects = () => {
                const statuses = ['All', 'Quotes Submitted', 'Upcoming', 'Ongoing', 'Completed'];
                const filtered = projectFilter === 'All' ? projects : projects.filter(p => p.status === projectFilter);

                const updateProjectStatus = (projectId, newStatus) => {
                    const updated = { ...projects.find(p => p.id === projectId), status: newStatus };
                    const updatedProjects = projects.map(p => p.id === projectId ? updated : p);
                    handleSetProjects(updatedProjects, 'upsert', updated);
                };

                return (
                    <div className="p-5 space-y-4 pb-24 relative">
                        <CloudIndicator />
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-bold text-yellow-400">Jobs</h1>
                            <button onClick={() => setView('add-project')} className="bg-yellow-400 text-gray-900 px-3 py-2 rounded-lg font-bold text-sm flex items-center gap-1 shadow-lg shadow-yellow-400/20">
                                <Plus size={16} /> New Job
                            </button>
                        </div>

                        <div className="flex gap-2 overflow-x-auto pb-2 -mx-5 px-5 scrollbar-hide" style={{ WebkitOverflowScrolling: 'touch' }}>
                            {statuses.map(s => (
                                <button key={s} onClick={() => setProjectFilter(s)} className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-colors ${projectFilter === s ? 'bg-yellow-400 text-gray-900' : 'bg-gray-800 text-gray-400 border border-gray-700'}`}>
                                    {s}
                                </button>
                            ))}
                        </div>

                        <div className="space-y-3">
                            {filtered.map(project => (
                                <div key={project.id} onClick={() => { setActiveProject(project); setView('project-detail'); }} className="bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between items-center active:bg-gray-700 transition-colors cursor-pointer shadow-sm">
                                    <div className="flex-1">
                                        <h3 className="font-bold text-white text-lg">{project.name}</h3>
                                        <p className="text-sm text-gray-400 mb-2">{project.client} • {formatCurrency(project.quote)}</p>
                                        
                                        <div onClick={(e) => e.stopPropagation()} className="inline-block relative">
                                            <select 
                                                value={project.status}
                                                onChange={(e) => updateProjectStatus(project.id, e.target.value)}
                                                className={`text-[10px] font-bold uppercase tracking-wider px-2 py-1.5 pr-6 rounded outline-none cursor-pointer appearance-none border border-transparent hover:border-gray-500 transition-colors ${
                                                    project.status === 'Ongoing' ? 'text-green-400 bg-green-400/10' :
                                                    project.status === 'Completed' ? 'text-gray-400 bg-gray-400/10' :
                                                    'text-blue-400 bg-blue-400/10'
                                                }`}
                                            >
                                                <option value="Quotes Submitted" className="bg-gray-800 text-white">Quotes Submitted</option>
                                                <option value="Upcoming" className="bg-gray-800 text-white">Upcoming</option>
                                                <option value="Ongoing" className="bg-gray-800 text-white">Ongoing</option>
                                                <option value="Completed" className="bg-gray-800 text-white">Completed</option>
                                            </select>
                                            <div className="absolute right-1 top-1/2 -translate-y-1/2 pointer-events-none opacity-70">
                                                <ChevronRight size={12} className="rotate-90" />
                                            </div>
                                        </div>
                                    </div>
                                    <ChevronRight className="text-gray-500 ml-2" />

                        const updatedLogs = materialLogs.filter(m => m.id !== editingMaterialLog.id);
                        handleSetMaterialLogs(updatedLogs, 'delete', editingMaterialLog);
                        setEditingMaterialLog(null);
                        setView('project-detail');
                    }
                };

                return (
                    <div className="p-5 pt-10 min-h-screen bg-gray-900 z-50">
                        <button onClick={() => { setEditingMaterialLog(null); setView('project-detail'); }} className="text-gray-400 mb-6 flex items-center gap-2"><ArrowLeft size={20}/> Cancel</button>
                        <h2 className="text-2xl font-bold text-white mb-6">Edit Material Entry</h2>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Date</label>
                                <input type="date" value={editMatDate} onChange={e => setEditMatDate(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Material / Receipt Description</label>
                                <input type="text" value={editMatItem} onChange={e => setEditMatItem(e.target.value)} placeholder="e.g. CEF Invoice #1234" className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Total Cost (€)</label>
                                <input type="number" step="0.01" value={editMatCost} onChange={e => setEditMatCost(e.target.value)} placeholder="e.g. 450.00" className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>

                            <div className="pt-4 space-y-3">
                                <button onClick={handleSave} className="w-full bg-yellow-400 text-gray-900 font-bold py-4 rounded-xl flex justify-center items-center gap-2">
                                    <Save size={20} /> Save Changes
                                </button>
                                <button onClick={handleDelete} className="w-full bg-red-500/10 border border-red-500/30 text-red-500 font-bold py-4 rounded-xl flex justify-center items-center gap-2">
                                    <Trash2 size={20} /> Delete Entry
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- VIEW: TEAM ---
            const renderTeam = () => {
                return (
                    <div className="p-5 space-y-4 pb-24 relative">
                        <CloudIndicator />
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-2xl font-bold text-yellow-400">Team & Rates</h1>
                        </div>
                        
                        <div className="space-y-3">
                            {people.map(person => (
                                <div key={person.id} onClick={() => { setEditingPerson(person); setEditPersonName(person.name); setEditPersonRole(person.role || ''); setEditPersonRate(person.rate); setView('edit-person'); }} className="bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between items-center cursor-pointer hover:bg-gray-700 transition-colors">
                                    <div>
                                        <h3 className="font-bold text-white text-lg">{person.name}</h3>
                                        <p className="text-sm text-gray-400">{person.role}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="text-right bg-gray-900 py-1 px-3 rounded-lg border border-gray-700">
                                            <p className="font-bold text-yellow-400 text-lg">€{person.rate}<span className="text-xs text-gray-400">/hr</span></p>
                                        </div>
                                        <Edit size={16} className="text-gray-500" />
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <button onClick={() => setView('add-person')} className="w-full border-2 border-dashed border-gray-700 text-gray-400 rounded-xl py-4 font-bold flex justify-center items-center gap-2 hover:border-yellow-400 hover:text-yellow-400 transition-colors mt-4">
                            <UserPlus size={20} /> Add Team Member
                        </button>
                    </div>
                );
            };

            // --- VIEW: ADD PERSON ---
            const renderAddPerson = () => {
                const handleSave = () => {
                    if (!newPersonName || !newPersonRate) return alert('Provide Name and Rate.');
                    const newPerson = { id: 'usr_' + Date.now().toString(), name: newPersonName, role: newPersonRole, rate: Number(newPersonRate) };
                    handleSetPeople([...people, newPerson], 'upsert', newPerson);
                    setNewPersonName(''); setNewPersonRole('Electrician'); setNewPersonRate('');
                    setView('main');
                };

                return (
                    <div className="p-5 pt-10 min-h-screen bg-gray-900 z-50">
                        <button onClick={() => setView('main')} className="text-gray-400 mb-6 flex items-center gap-2"><ArrowLeft size={20}/> Cancel</button>
                        <h2 className="text-2xl font-bold text-yellow-400 mb-6">Add Team Member</h2>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Name</label>
                                <input type="text" value={newPersonName} onChange={e => setNewPersonName(e.target.value)} placeholder="e.g. Paul (Apprentice)" className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Role</label>
                                <input type="text" value={newPersonRole} onChange={e => setNewPersonRole(e.target.value)} placeholder="e.g. Electrician" className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Hourly Rate Cost to Business (€)</label>
                                <input type="number" value={newPersonRate} onChange={e => setNewPersonRate(e.target.value)} placeholder="e.g. 25" className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <button onClick={handleSave} className="w-full bg-yellow-400 text-gray-900 font-bold py-4 rounded-xl mt-6 flex justify-center items-center gap-2">
                                <Save size={20} /> Save Person
                            </button>
                        </div>
                    </div>
                );
            };

            // --- VIEW: EDIT PERSON ---
            const renderEditPerson = () => {
                if (!editingPerson) return null;

                const handleSave = () => {
                    if (!editPersonName || editPersonRate === '' || editPersonRate === null) return alert('Provide Name and Rate.');
                    const updatedPerson = { ...editingPerson, name: editPersonName, role: editPersonRole, rate: Number(editPersonRate) };
                    const updatedPeople = people.map(p => p.id === editingPerson.id ? updatedPerson : p);
                    handleSetPeople(updatedPeople, 'upsert', updatedPerson);
                    setEditingPerson(null);
                    setView('main');
                };

                const handleDelete = () => {
                    const loggedHours = timeLogs.filter(t => t.personId === editingPerson.id).length;
                    const warning = loggedHours > 0
                        ? `${editingPerson.name} has ${loggedHours} time entr${loggedHours === 1 ? 'y' : 'ies'} logged. Deleting them will leave those entries showing as "Unknown User" with no labour cost. Delete anyway?`
                        : `Delete ${editingPerson.name}?`;
                    if (window.confirm(warning)) {
                        const updatedPeople = people.filter(p => p.id !== editingPerson.id);
                        handleSetPeople(updatedPeople, 'delete', editingPerson);
                        setEditingPerson(null);
                        setView('main');
                    }
                };

                return (
                    <div className="p-5 pt-10 min-h-screen bg-gray-900 z-50">
                        <button onClick={() => { setEditingPerson(null); setView('main'); }} className="text-gray-400 mb-6 flex items-center gap-2"><ArrowLeft size={20}/> Cancel</button>
                        <h2 className="text-2xl font-bold text-yellow-400 mb-6">Edit Team Member</h2>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Name</label>
                                <input type="text" value={editPersonName} onChange={e => setEditPersonName(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Role</label>
                                <input type="text" value={editPersonRole} onChange={e => setEditPersonRole(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-400 mb-1">Hourly Rate Cost to Business (€)</label>
                                <input type="number" value={editPersonRate} onChange={e => setEditPersonRate(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:border-yellow-400 outline-none" />
                                <p className="text-xs text-gray-500 mt-2">Changing the rate updates the labour cost on every job this person has logged time against, past and present.</p>
                            </div>

                            <div className="pt-4 space-y-3">
                                <button onClick={handleSave} className="w-full bg-yellow-400 text-gray-900 font-bold py-4 rounded-xl flex justify-center items-center gap-2">
                                    <Save size={20} /> Save Changes
                                </button>
                                <button onClick={handleDelete} className="w-full bg-red-500/10 border border-red-500/30 text-red-500 font-bold py-4 rounded-xl flex justify-center items-center gap-2">
                                    <Trash2 size={20} /> Delete Member
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- VIEW: SETTINGS ---
            const renderSettings = () => {
                const saveUrl = () => {
                    setScriptUrl(localUrlInput.trim());
                    alert("Database link saved. The app will now reload.");
                    window.location.reload();
                };

                return (
                    <div className="p-5 space-y-6 pb-24 relative">
                        <CloudIndicator />
                        <h1 className="text-2xl font-bold text-yellow-400 mb-6">Settings</h1>

                        <div className="bg-gray-800 p-5 rounded-xl border border-gray-700 space-y-4 shadow-lg">
                            <h3 className="font-bold text-white flex items-center gap-2"><Link size={18} className="text-yellow-400"/> Database Connection</h3>
                            <p className="text-sm text-gray-400 leading-relaxed">
                                Enter your Google Apps Script Web App URL below to connect this device to your cloud database. Because this is saved locally on your phone, hosting the app on GitHub Pages is perfectly secure.
                            </p>
                            
                            <div>
                                <input 
                                    type="text" 
                                    value={localUrlInput} 
                                    onChange={e => setLocalUrlInput(e.target.value)} 
                                    placeholder="https://script.google.com/macros/s/..." 
                                    className="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm text-white focus:border-yellow-400 outline-none font-mono" 
                                />
                            </div>
                            
                            <button onClick={saveUrl} className="w-full bg-yellow-400 text-gray-900 hover:bg-yellow-300 font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                <Save size={18} /> Save & Connect
                            </button>
                        </div>
                    </div>
                );
            };

            // --- VIEW: ANALYTICS ---
            const renderAnalytics = () => {
                const statuses = ['All', 'Quotes Submitted', 'Upcoming', 'Ongoing', 'Completed'];
                const statusProjects = analyticsFilter === 'All' ? projects : projects.filter(p => p.status === analyticsFilter);
                const siteValid = analyticsSite !== 'All' && statusProjects.some(p => p.id === analyticsSite);
                const scopedProjects = siteValid ? statusProjects.filter(p => p.id === analyticsSite) : statusProjects;
                const scopedIds = new Set(scopedProjects.map(p => p.id));

                // Per-job financials
                const jobStats = scopedProjects
                    .map(p => {
                        const fin = getProjectFinancials(p.id);
                        return fin ? { id: p.id, name: p.name, status: p.status, ...fin } : null;
                    })
                    .filter(Boolean);

                const totalLabour = jobStats.reduce((s, j) => s + j.labourCost, 0);
                const totalMaterials = jobStats.reduce((s, j) => s + j.materialCost, 0);
                const totalSpend = totalLabour + totalMaterials;
                const totalProfit = jobStats.reduce((s, j) => s + j.currentProfit, 0);

                // Profit by job (only jobs with a quote or some spend)
                const profitJobs = jobStats
                    .filter(j => j.quote > 0 || j.totalCost > 0)
                    .sort((a, b) => b.currentProfit - a.currentProfit);
                const maxAbsProfit = Math.max(1, ...profitJobs.map(j => Math.abs(j.currentProfit)));

                // Hours per team member (only on the jobs in scope)
                const hoursByPerson = people
                    .map(person => {
                        const hrs = timeLogs
                            .filter(t => t.personId === person.id && scopedIds.has(t.projectId))
                            .reduce((s, t) => s + Number(t.hours), 0);
                        return { id: person.id, name: person.name, role: person.role, hrs, cost: hrs * (person.rate || 0) };
                    })
                    .filter(p => p.hrs > 0)
                    .sort((a, b) => b.hrs - a.hrs);
                const maxHrs = Math.max(1, ...hoursByPerson.map(p => p.hrs));

                // Donut geometry for labour vs materials
                const R = 42, C = 2 * Math.PI * R;
                const labourFrac = totalSpend > 0 ? totalLabour / totalSpend : 0;
                const labourLen = labourFrac * C;

                const Section = ({ icon, title, children }) => (
                    <div className="bg-gray-800 rounded-xl p-5 border border-gray-700 shadow-lg">
                        <h3 className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-4 flex items-center gap-2">{icon} {title}</h3>
                        {children}
                    </div>
                );

                return (
                    <div className="p-5 space-y-6 pb-24 relative">
                        <CloudIndicator />
                        <h1 className="text-2xl font-bold text-yellow-400 mb-2">Analytics</h1>

                        {/* Status filter */}
                        <div className="flex gap-2 overflow-x-auto pb-2 -mx-5 px-5 scrollbar-hide" style={{ WebkitOverflowScrolling: 'touch' }}>
                            {statuses.map(s => (
                                <button key={s} onClick={() => { setAnalyticsFilter(s); setAnalyticsSite('All'); }} className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-colors ${analyticsFilter === s ? 'bg-yellow-400 text-gray-900' : 'bg-gray-800 text-gray-400 border border-gray-700'}`}>
                                    {s}
                                </button>
                            ))}
                        </div>

                        {/* Site selector */}
                        <div className="relative">
                            <select value={siteValid ? analyticsSite : 'All'} onChange={e => setAnalyticsSite(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 pr-10 text-white text-sm font-bold appearance-none focus:border-yellow-400 outline-none">
                                <option value="All" className="bg-gray-800">All sites{analyticsFilter !== 'All' ? ` (${analyticsFilter})` : ''}</option>
                                {statusProjects.map(p => <option key={p.id} value={p.id} className="bg-gray-800">{p.name}</option>)}
                            </select>
                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                <ChevronRight size={16} className="rotate-90" />
                            </div>
                        </div>

                        {/* KPI row */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-inner">
                                <h3 className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Total Profit</h3>
                                <p className={`text-2xl font-bold ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatCurrency(totalProfit)}</p>
                            </div>
                            <div className="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-inner">
                                <h3 className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Total Spend</h3>
                                <p className="text-2xl font-bold text-white">{formatCurrency(totalSpend)}</p>
                            </div>
                        </div>

                        {/* Profit & margin by job */}
                        <Section icon={<TrendingUp size={14}/>} title="Profit & Margin by Job">
                            {profitJobs.length === 0 ? (
                                <p className="text-gray-500 text-sm text-center py-4">No jobs with figures yet.</p>
                            ) : (
                                <div className="space-y-4">
                                    {profitJobs.map(j => {
                                        const pos = j.currentProfit >= 0;
                                        const barPct = (Math.abs(j.currentProfit) / maxAbsProfit) * 100;
                                        return (
                                            <div key={j.id}>
                                                <div className="flex justify-between items-baseline mb-1">
                                                    <span className="text-sm font-bold text-white truncate max-w-[55%]">{j.name}</span>
                                                    <span className="text-sm font-bold flex items-center gap-2">
                                                        <span className={pos ? 'text-green-400' : 'text-red-400'}>{formatCurrency(j.currentProfit)}</span>
                                                        <span className="text-[11px] text-gray-400">{j.profitMargin.toFixed(0)}%</span>
                                                    </span>
                                                </div>
                                                <div className="w-full bg-gray-700 rounded-full h-2.5 overflow-hidden">
                                                    <div className={`h-full rounded-full ${pos ? 'bg-green-500' : 'bg-red-500'}`} style={{ width: `${barPct}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </Section>

                        {/* Labour vs materials split */}
                        <Section icon={<PieChart size={14}/>} title="Labour vs Materials">
                            {totalSpend === 0 ? (
                                <p className="text-gray-500 text-sm text-center py-4">No costs logged yet.</p>
                            ) : (
                                <div className="flex items-center gap-5">
                                    <div className="relative flex-shrink-0">
                                        <svg width="120" height="120" viewBox="0 0 100 100" className="-rotate-90">
                                            <circle cx="50" cy="50" r={R} fill="none" stroke="#c084fc" strokeWidth="14" />
                                            <circle cx="50" cy="50" r={R} fill="none" stroke="#fb923c" strokeWidth="14"
                                                strokeDasharray={`${labourLen} ${C}`} strokeLinecap="butt" />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-[10px] text-gray-400 uppercase tracking-wider">Spend</span>
                                            <span className="text-sm font-bold text-white leading-tight">{formatCurrency(totalSpend)}</span>
                                        </div>
                                    </div>
                                    <div className="flex-1 space-y-3">
                                        <div>
                                            <div className="flex items-center gap-2 mb-0.5">
                                                <span className="w-3 h-3 rounded-sm bg-orange-400 inline-block"></span>
                                                <span className="text-sm font-bold text-white">Labour</span>
                                            </div>
                                            <p className="text-sm text-gray-300 pl-5">{formatCurrency(totalLabour)} <span className="text-gray-500">({(labourFrac * 100).toFixed(0)}%)</span></p>
                                        </div>
                                        <div>
                                            <div className="flex items-center gap-2 mb-0.5">
                                                <span className="w-3 h-3 rounded-sm bg-purple-400 inline-block"></span>
                                                <span className="text-sm font-bold text-white">Materials</span>
                                            </div>
                                            <p className="text-sm text-gray-300 pl-5">{formatCurrency(totalMaterials)} <span className="text-gray-500">({((1 - labourFrac) * 100).toFixed(0)}%)</span></p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </Section>

                        {/* Hours by team member */}
                        <Section icon={<Clock size={14}/>} title="Hours Logged by Team Member">
                            {hoursByPerson.length === 0 ? (
                                <p className="text-gray-500 text-sm text-center py-4">No time logged yet.</p>
                            ) : (
                                <div className="space-y-4">
                                    {hoursByPerson.map(p => (
                                        <div key={p.id}>
                                            <div className="flex justify-between items-baseline mb-1">
                                                <span className="text-sm font-bold text-white truncate max-w-[55%]">{p.name}</span>
                                                <span className="text-sm font-bold flex items-center gap-2">
                                                    <span className="text-white">{p.hrs} hrs</span>
                                                    <span className="text-[11px] text-gray-400">{formatCurrency(p.cost)}</span>
                                                </span>
                                            </div>
                                            <div className="w-full bg-gray-700 rounded-full h-2.5 overflow-hidden">
                                                <div className="h-full rounded-full bg-yellow-400" style={{ width: `${(p.hrs / maxHrs) * 100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </Section>
                    </div>
                );
            };

            // ==========================================
            // 4. MAIN RENDER ROUTING
            // ==========================================
            const renderContent = () => {
                if (!scriptUrl && activeTab !== 'settings') {
                    return (
                        <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                            <Cloud className="text-gray-600 mb-4" size={48} />
                            <h2 className="text-xl font-bold text-white mb-2">No Database Connected</h2>
                            <p className="text-gray-400 text-sm mb-6">Please go to Settings to enter your Google Apps Script URL.</p>
                            <button onClick={() => setActiveTab('settings')} className="bg-yellow-400 text-gray-900 font-bold py-3 px-6 rounded-xl">Go to Settings</button>
                        </div>
                    );
                }

                if (loading && scriptUrl) return <div className="h-screen flex flex-col items-center justify-center text-yellow-400"><RefreshCw className="animate-spin mb-4" size={32}/><p className="text-sm font-bold text-gray-400">Loading Data...</p></div>;
                
                if (view === 'add-project') return renderAddProject();
                if (view === 'edit-project') return renderEditProject();
                if (view === 'add-person') return renderAddPerson();
                if (view === 'edit-person') return renderEditPerson();
                if (view === 'project-detail') return renderProjectDetail();
                if (view === 'add-time') return renderAddTime();
                if (view === 'edit-time') return renderEditTime();
                if (view === 'add-material') return renderAddMaterial();
                if (view === 'edit-material') return renderEditMaterial();
                
                switch(activeTab) {
                    case 'dashboard': return renderDashboard();
                    case 'projects': return renderProjects();
                    case 'analytics': return renderAnalytics();
                    case 'team': return renderTeam();
                    case 'settings': return renderSettings();
                    default: return renderDashboard();
                }
            };

            const showNav = view === 'main' && (!loading || !scriptUrl);

            return (
                <div className="bg-gray-900 min-h-screen max-w-md mx-auto relative shadow-2xl border-x border-gray-800">
                    <div className="h-full overflow-y-auto">
                        {renderContent()}
                    </div>

                    {showNav && (
                        <nav className="fixed bottom-0 w-full max-w-md bg-gray-800 border-t border-gray-700 px-3 py-3 flex justify-around items-center z-40 pb-safe">
                            <NavItem icon={<Home />} label="Home" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavItem icon={<Briefcase />} label="Jobs" active={activeTab === 'projects'} onClick={() => setActiveTab('projects')} />
                            <NavItem icon={<BarChart3 />} label="Analytics" active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} />
                            <NavItem icon={<Users />} label="Team" active={activeTab === 'team'} onClick={() => setActiveTab('team')} />
                            <NavItem icon={<Settings />} label="Settings" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                        </nav>
                    )}
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-colors ${active ? 'text-yellow-400' : 'text-gray-500 hover:text-gray-300'}`}>
                    {React.cloneElement(icon, { size: active ? 24 : 22, strokeWidth: active ? 2.5 : 2 })}
                    <span className="text-[10px] font-bold tracking-wide">{label}</span>
                </button>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
